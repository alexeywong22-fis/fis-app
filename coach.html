<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIS 教練後台</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+HK:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04080f;
    --surface: #0a1628;
    --gold: #ffc845;
    --gold-dim: rgba(255,200,69,0.3);
    --cyan: #00d4ff;
    --red: #ff4757;
    --green: #2ed573;
    --text: #c8e6ff;
    --text-dim: rgba(180,210,255,0.5);
    --border: rgba(0,150,255,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans HK',sans-serif; min-height:100vh; }

  .header {
    background:linear-gradient(90deg,#050d1a,#0d2545);
    border-bottom:1px solid var(--border);
    padding:16px 32px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .brand { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:4px; color:var(--gold); text-shadow:0 0 20px rgba(255,200,69,0.4); }
  .brand-sub { font-size:11px; color:var(--text-dim); letter-spacing:2px; margin-top:2px; }
  .status { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-dim); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .container { max-width:1200px; margin:0 auto; padding:32px 24px; }

  .card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:24px;
    margin-bottom:24px;
  }
  .label { font-size:10px; color:var(--cyan); letter-spacing:2px; font-weight:700; margin-bottom:12px; }

  .input {
    width:100%; background:rgba(0,0,0,0.4);
    border:1px solid var(--border); border-radius:10px;
    padding:12px 16px; color:var(--text);
    font-family:'Noto Sans HK',sans-serif; font-size:13px;
    outline:none; margin-bottom:10px; transition:border-color 0.2s;
  }
  .input:focus { border-color:var(--cyan); }
  .input::placeholder { color:var(--text-dim); }
  .input[type=password] { letter-spacing:2px; }

  .btn {
    background:var(--gold); color:#000;
    border:none; border-radius:10px;
    padding:12px 28px; font-size:13px; font-weight:700;
    cursor:pointer; transition:all 0.2s; width:100%;
  }
  .btn:hover { background:#ffda6b; }
  .btn-ghost {
    background:transparent; color:var(--text);
    border:1px solid var(--border); border-radius:8px;
    padding:8px 16px; font-size:12px; cursor:pointer;
  }
  .btn-ghost:hover { border-color:var(--cyan); }

  .error {
    background:rgba(255,71,87,0.1); border:1px solid rgba(255,71,87,0.3);
    border-radius:12px; padding:14px 18px; color:var(--red);
    font-size:13px; margin-bottom:16px; display:none;
  }

  #loading { display:none; text-align:center; padding:60px; color:var(--text-dim); font-size:13px; letter-spacing:2px; }
  .loader { width:40px; height:40px; border:2px solid var(--border); border-top-color:var(--cyan); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

  /* User grid */
  .user-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
  .user-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:20px; cursor:pointer;
    transition:border-color 0.2s, transform 0.2s;
    animation:fadeUp 0.3s ease both;
  }
  .user-card:hover { border-color:var(--cyan); transform:translateY(-2px); }
  .user-avatar {
    width:44px; height:44px; border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),#4466ff);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:20px; color:#fff;
    flex-shrink:0;
  }
  .user-card-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .user-card-name { font-weight:700; color:var(--text); font-size:14px; }
  .user-card-id { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--text-dim); }
  .stat-row { display:flex; gap:8px; }
  .stat { flex:1; text-align:center; }
  .stat-num { font-family:'Bebas Neue',sans-serif; font-size:24px; }
  .stat-lbl { font-size:9px; color:var(--text-dim); margin-top:2px; }
  .user-card-footer { margin-top:12px; font-size:10px; color:var(--text-dim); border-top:1px solid rgba(255,255,255,0.05); padding-top:10px; }

  /* Summary cards */
  .summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px; margin-bottom:24px; }
  .summary-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; text-align:center; }
  .summary-num { font-family:'Bebas Neue',sans-serif; font-size:40px; line-height:1; color:var(--gold); text-shadow:0 0 20px rgba(255,200,69,0.3); }
  .summary-lbl { font-size:10px; color:var(--text-dim); letter-spacing:1px; margin-top:6px; }
  .summary-sub { font-size:12px; color:var(--cyan); margin-top:4px; font-weight:700; }

  /* Detail sections */
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  @media(max-width:700px) { .detail-grid { grid-template-columns:1fr; } }
  .section { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:20px; }
  .section-hd { padding:12px 18px; background:rgba(0,80,180,0.2); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .badge { font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:2px; color:var(--gold); background:rgba(255,200,69,0.1); border:1px solid var(--gold-dim); border-radius:6px; padding:2px 8px; }
  .section-title { font-size:13px; font-weight:700; }
  .section-bd { padding:14px 18px; }

  .row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
  .row:last-child { border-bottom:none; }
  .row-label { font-size:12px; color:var(--text-dim); }
  .pill { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
  .pill-red { background:rgba(255,71,87,0.15); color:var(--red); border:1px solid rgba(255,71,87,0.3); }
  .pill-green { background:rgba(46,213,115,0.15); color:var(--green); border:1px solid rgba(46,213,115,0.3); }

  .log-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
  .log-item:last-child { border-bottom:none; }
  .log-date { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); width:80px; flex-shrink:0; }
  .log-num { font-size:13px; font-weight:900; width:30px; text-align:center; }
  .bar-wrap { flex:1; height:5px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
  .bar { height:100%; border-radius:3px; }
  .tags { display:flex; gap:4px; flex-shrink:0; }
  .tag { font-size:9px; padding:2px 6px; border-radius:4px; font-weight:700; }
  .tag-r { background:rgba(255,71,87,0.2); color:var(--red); }
  .tag-g { background:rgba(46,213,115,0.15); color:var(--green); }
  .tag-y { background:rgba(255,200,69,0.15); color:var(--gold); }

  .empty { text-align:center; padding:24px; color:var(--text-dim); font-size:12px; }

  .user-hd { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px 24px; margin-bottom:20px; display:flex; align-items:center; gap:16px; }
  .user-hd-avatar { width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,var(--cyan),#4466ff); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:22px; color:#fff; flex-shrink:0; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="brand">FIS COACH</div>
    <div class="brand-sub">FASCIAL INTEGRATION SYSTEM — 教練後台</div>
  </div>
  <div class="status"><div class="dot"></div><span>系統運行中</span></div>
</div>

<div class="container">
  <div class="error" id="errBox"></div>
  <div id="loading"><div class="loader"></div>載入中...</div>

  <!-- 登入 -->
  <div id="loginView">
    <div class="card" style="max-width:480px;margin:60px auto">
      <div class="label">🔐 教練登入</div>
      <input class="input" id="inUser" type="text" placeholder="教練用戶名">
      <input class="input" id="inPass" type="password" placeholder="教練密碼">
      <button class="btn" id="loginBtn">登入</button>
    </div>
  </div>

  <!-- 學員列表 -->
  <div id="listView" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div class="label" style="margin:0">👥 所有學員</div>
      <button class="btn-ghost" id="logoutBtn">登出</button>
    </div>
    <div class="user-grid" id="userGrid"></div>
  </div>

  <!-- 學員詳情 -->
  <div id="detailView" style="display:none">
    <div style="margin-bottom:16px">
      <button class="btn-ghost" id="backBtn">← 返回學員列表</button>
    </div>
    <div class="user-hd" id="detailHd"></div>
    <div class="summary-grid" id="detailSummary"></div>
    <div class="detail-grid">
      <div class="section" id="detailFascia"></div>
      <div class="section" id="detailHotspot"></div>
    </div>
    <div class="section" id="detailLogs"></div>
    <div class="section" id="detailPain"></div>
  </div>
</div>

<script>
var API = 'https://fis-app.alexeywong22.workers.dev';
var _u = '', _p = '';

var fasciaNames = {
  deep_front_line: '深前線',
  lateral_line: '側線',
  spiral_line: '螺旋線',
  superficial_back_line: '淺背線',
  superficial_front_line: '淺前線'
};

function show(id) {
  ['loginView','listView','detailView'].forEach(function(v) {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
}
function showErr(msg) {
  var el = document.getElementById('errBox');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(function(){ el.style.display='none'; }, 4000);
}
function loading(on) { document.getElementById('loading').style.display = on ? 'block' : 'none'; }

// ── 登入 ──
document.getElementById('loginBtn').addEventListener('click', function() {
  var u = document.getElementById('inUser').value.trim();
  var p = document.getElementById('inPass').value.trim();
  if (!u || !p) { showErr('請輸入用戶名和密碼'); return; }
  loading(true);
  fetch(API + '/api/coach/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username:u, password:p })
  }).then(function(r){ return r.json(); }).then(function(d) {
    loading(false);
    if (d.error) { showErr('❌ 用戶名或密碼錯誤'); return; }
    _u = u; _p = p;
    show('listView');
    loadAllUsers();
  }).catch(function(e){ loading(false); showErr('網絡錯誤：'+e.message); });
});

// 按 Enter 登入
document.getElementById('inPass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

// ── 登出 ──
document.getElementById('logoutBtn').addEventListener('click', function() {
  _u = ''; _p = '';
  show('loginView');
});

// ── 返回列表 ──
document.getElementById('backBtn').addEventListener('click', function() {
  show('listView');
});

// ── 所有學員 ──
function loadAllUsers() {
  loading(true);
  fetch(API + '/api/coach/users', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username:_u, password:_p })
  }).then(function(r){ return r.json(); }).then(function(d) {
    loading(false);
    var users = d.users || [];
    var grid = document.getElementById('userGrid');
    if (users.length === 0) { grid.innerHTML = '<div class="empty">尚無學員</div>'; return; }
    grid.innerHTML = '';
    users.forEach(function(u, i) {
      var card = document.createElement('div');
      card.className = 'user-card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML =
        '<div class="user-card-header">' +
          '<div class="user-avatar">' + (u.name||'U').substring(0,1).toUpperCase() + '</div>' +
          '<div><div class="user-card-name">' + (u.name||'未命名') + '</div>' +
          '<div class="user-card-id">' + u.id + '</div></div>' +
        '</div>' +
        '<div class="stat-row">' +
          '<div class="stat"><div class="stat-num" style="color:var(--gold)">' + (u.fascia_count||0) + '</div><div class="stat-lbl">FIS測試</div></div>' +
          '<div class="stat"><div class="stat-num" style="color:var(--cyan)">' + (u.log_count||0) + '</div><div class="stat-lbl">訓練日誌</div></div>' +
          '<div class="stat"><div class="stat-num" style="color:var(--red)">' + (u.pain_count||0) + '</div><div class="stat-lbl">痛點</div></div>' +
        '</div>' +
        '<div class="user-card-footer">最後活躍：' + ((u.last_active||'').substring(0,10)||'從未') + '</div>';
      card.addEventListener('click', function(){ loadDetail(u.id); });
      grid.appendChild(card);
    });
  }).catch(function(e){ loading(false); showErr('載入失敗：'+e.message); });
}

// ── 學員詳情 ──
function loadDetail(userId) {
  loading(true);
  fetch(API + '/api/coach/user-summary', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ user_id:userId, username:_u, password:_p })
  }).then(function(r){ return r.json(); }).then(function(d) {
    loading(false);
    if (d.error) { showErr('錯誤：'+d.error); return; }
    renderDetail(d);
    show('detailView');
  }).catch(function(e){ loading(false); showErr('網絡錯誤：'+e.message); });
}

function renderDetail(data) {
  var u = data.user, s = data.summary, f = data.fisData, pr = data.progressData, pa = data.painData;

  // Header
  document.getElementById('detailHd').innerHTML =
    '<div class="user-hd-avatar">' + (u.name||'U').substring(0,1).toUpperCase() + '</div>' +
    '<div><div style="font-size:18px;font-weight:900">' + (u.name||u.id) + '</div>' +
    '<div style="font-family:JetBrains Mono,monospace;font-size:10px;color:var(--text-dim);margin-top:2px">' + u.id + '</div>' +
    '<div style="font-size:11px;color:var(--text-dim);margin-top:4px">加入：' + (u.created_at||'').substring(0,10) + '</div></div>';

  // Summary
  var avg = s.avgMuscleActivation;
  var sub = avg >= 3 ? '狀態良好' : avg >= 2 ? '需要改善' : '需要關注';
  document.getElementById('detailSummary').innerHTML =
    card40(s.totalFasciaTests||0, 'FIS 測試') +
    card40(s.totalProgressLogs||0, '訓練日誌') +
    card40(avg ? avg+'/4' : '—', '平均發力感', sub) +
    card40(s.backCompensationRate||'—', '腰部代償率') +
    card40(s.totalPainDiagnoses||0, '痛點診斷');

  // Fascia
  var fHtml = '<div class="section-hd"><div class="badge">FIS</div><div class="section-title">最新筋膜線評估</div></div><div class="section-bd">';
  if (f.latest) {
    Object.keys(fasciaNames).forEach(function(k) {
      var v = f.latest[k];
      var isAlert = v === 1;
      var label = isAlert ? '優先關注' : v === 2 ? '狀態良好' : '未測試';
      var cls = isAlert ? 'pill-red' : v === 2 ? 'pill-green' : '';
      fHtml += '<div class="row"><span class="row-label">' + fasciaNames[k] + '</span><span class="pill ' + cls + '">' + label + '</span></div>';
    });
  } else { fHtml += '<div class="empty">尚無測試紀錄</div>'; }
  fHtml += '</div>';
  document.getElementById('detailFascia').innerHTML = fHtml;

  // Hotspots
  var hHtml = '<div class="section-hd"><div class="badge">RX</div><div class="section-title">痛點熱區</div></div><div class="section-bd">';
  if (pa.hotspots && pa.hotspots.length > 0) {
    pa.hotspots.forEach(function(h, i) {
      hHtml += '<div class="row"><span style="color:var(--text-dim);font-size:18px;font-family:Bebas Neue,sans-serif">' + (i+1) + '</span><span class="row-label" style="flex:1;margin:0 12px">' + h.part + '</span><span style="color:var(--red);font-weight:700">' + h.count + '次</span></div>';
    });
  } else { hHtml += '<div class="empty">尚無痛點紀錄</div>'; }
  hHtml += '</div>';
  document.getElementById('detailHotspot').innerHTML = hHtml;

  // Logs
  var logs = pr.logs || [];
  var lHtml = '<div class="section-hd"><div class="badge">DATA</div><div class="section-title">訓練日誌（最近20次）</div></div><div class="section-bd">';
  if (logs.length > 0) {
    logs.forEach(function(l) {
      var act = l.muscle_activation || 0;
      var pct = (act/4)*100;
      var col = act >= 3 ? '#2ed573' : act >= 2 ? '#ffc845' : '#ff4757';
      var compTag = l.back_compensation === '有' ? '<span class="tag tag-r">代償有</span>' : l.back_compensation === '輕微' ? '<span class="tag tag-y">代償輕微</span>' : '<span class="tag tag-g">代償無</span>';
      var tensCol = l.tension_speed === '1-2次' ? 'tag-g' : l.tension_speed === '3次後' ? 'tag-y' : 'tag-r';
      lHtml += '<div class="log-item">' +
        '<div class="log-date">' + (l.logged_at||'').substring(0,10) + '</div>' +
        '<div class="log-num" style="color:' + col + '">' + act + '</div>' +
        '<div class="bar-wrap"><div class="bar" style="width:' + pct + '%;background:' + col + '"></div></div>' +
        '<div class="tags">' + compTag + '<span class="tag ' + tensCol + '">' + (l.tension_speed||'—') + '</span></div>' +
        '</div>';
    });
  } else { lHtml += '<div class="empty">尚無訓練紀錄</div>'; }
  lHtml += '</div>';
  document.getElementById('detailLogs').innerHTML = lHtml;

  // Pain
  var diag = pa.diagnoses || [];
  var pHtml = '<div class="section-hd"><div class="badge">RX</div><div class="section-title">痛點診斷歷史</div></div>';
  if (diag.length > 0) {
    diag.forEach(function(p) {
      var sc = p.status === 'resolved' ? 'pill-green' : 'pill-red';
      var sl = p.status === 'resolved' ? '已解決' : '追蹤中';
      pHtml += '<div style="padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;gap:12px;align-items:flex-start">' +
        '<div style="font-family:JetBrains Mono,monospace;font-size:10px;color:var(--text-dim);width:80px;flex-shrink:0;padding-top:2px">' + (p.reported_at||'').substring(0,10) + '</div>' +
        '<div style="font-size:12px;font-weight:700;color:var(--red);width:60px;flex-shrink:0">' + (p.body_part||'—') + '</div>' +
        '<div style="flex:1;font-size:11px;color:var(--text-dim);line-height:1.5">' + (p.symptom_description||'') + '</div>' +
        '<span class="pill ' + sc + '">' + sl + '</span>' +
        '</div>';
    });
  } else { pHtml += '<div class="empty">尚無痛點診斷</div>'; }
  document.getElementById('detailPain').innerHTML = pHtml;
}

function card40(num, lbl, sub) {
  return '<div class="summary-card"><div class="summary-num">' + num + '</div><div class="summary-lbl">' + lbl + '</div>' + (sub ? '<div class="summary-sub">' + sub + '</div>' : '') + '</div>';
}
</script>
</body>
</html>
