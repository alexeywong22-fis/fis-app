<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIS 教練後台</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+HK:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04080f;
    --surface: #0a1628;
    --surface2: #0d1f3c;
    --gold: #ffc845;
    --gold-dim: rgba(255,200,69,0.3);
    --cyan: #00d4ff;
    --cyan-dim: rgba(0,212,255,0.15);
    --red: #ff4757;
    --green: #2ed573;
    --text: #c8e6ff;
    --text-dim: rgba(180,210,255,0.5);
    --border: rgba(0,150,255,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans HK', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(90deg, #050d1a, #0d2545);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,200,69,0.4);
  }
  .header-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-top: 2px;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Layout ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  /* ── Search ── */
  .search-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 32px;
  }
  .search-label {
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .search-row {
    display: flex;
    gap: 12px;
  }
  .search-input {
    flex: 1;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--cyan); }
  .search-input::placeholder { color: var(--text-dim); }
  .btn-search {
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-family: 'Noto Sans HK', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-search:hover { background: #ffda6b; transform: translateY(-1px); }

  /* ── Loading ── */
  #loading {
    display: none;
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 2px;
  }
  .loader {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error ── */
  #error {
    display: none;
    background: rgba(255,71,87,0.1);
    border: 1px solid rgba(255,71,87,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 24px;
  }

  /* ── Dashboard ── */
  #dashboard { display: none; }

  /* User Header */
  .user-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  .user-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), #4466ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #fff;
    margin-right: 16px;
    flex-shrink: 0;
  }
  .user-info { flex: 1; }
  .user-name { font-size: 18px; font-weight: 900; color: var(--text); }
  .user-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .user-since { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .user-left { display: flex; align-items: center; }

  /* Summary Cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease 0.1s both;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
  }
  .summary-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    line-height: 1;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,200,69,0.3);
  }
  .summary-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 6px;
    text-transform: uppercase;
  }
  .summary-sub {
    font-size: 12px;
    color: var(--cyan);
    margin-top: 4px;
    font-weight: 700;
  }

  /* Sections */
  .sections-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media(max-width: 700px) { .sections-grid { grid-template-columns: 1fr; } }

  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.4s ease 0.2s both;
  }
  .section-header {
    padding: 14px 20px;
    background: rgba(0,80,180,0.2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold);
    background: rgba(255,200,69,0.1);
    border: 1px solid var(--gold-dim);
    border-radius: 6px;
    padding: 2px 8px;
  }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .section-body { padding: 16px 20px; }

  /* Fascia Lines */
  .fascia-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .fascia-row:last-child { border-bottom: none; }
  .fascia-name { font-size: 12px; color: var(--text-dim); }
  .fascia-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .badge-alert { background: rgba(255,71,87,0.15); color: var(--red); border: 1px solid rgba(255,71,87,0.3); }
  .badge-good { background: rgba(46,213,115,0.15); color: var(--green); border: 1px solid rgba(46,213,115,0.3); }

  /* Progress logs */
  .log-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .log-item:last-child { border-bottom: none; }
  .log-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); width: 80px; flex-shrink: 0; }
  .log-activation {
    font-size: 13px;
    font-weight: 900;
    width: 32px;
    text-align: center;
  }
  .log-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
  .log-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .log-tags { display: flex; gap: 4px; flex-shrink: 0; }
  .log-tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
  }
  .tag-bad { background: rgba(255,71,87,0.2); color: var(--red); }
  .tag-ok { background: rgba(46,213,115,0.15); color: var(--green); }
  .tag-mid { background: rgba(255,200,69,0.15); color: var(--gold); }

  /* Pain hotspots */
  .hotspot-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .hotspot-item:last-child { border-bottom: none; }
  .hotspot-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--text-dim);
    width: 24px;
  }
  .hotspot-name { flex: 1; font-size: 13px; color: var(--text); }
  .hotspot-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--red);
    font-weight: 700;
  }

  /* Empty state */
  .empty { text-align: center; padding: 24px; color: var(--text-dim); font-size: 12px; }

  /* Full width section */
  .full-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease 0.3s both;
  }
  .pain-item {
    padding: 12px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .pain-item:last-child { border-bottom: none; }
  .pain-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); width: 80px; flex-shrink: 0; padding-top: 2px; }
  .pain-part { font-size: 12px; font-weight: 700; color: var(--red); width: 60px; flex-shrink: 0; }
  .pain-desc { flex: 1; font-size: 11px; color: var(--text-dim); line-height: 1.5; }
  .pain-status {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .status-active { background: rgba(255,71,87,0.15); color: var(--red); border: 1px solid rgba(255,71,87,0.3); }
  .status-resolved { background: rgba(46,213,115,0.15); color: var(--green); border: 1px solid rgba(46,213,115,0.3); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-brand">FIS COACH</div>
    <div class="header-sub">FASCIAL INTEGRATION SYSTEM — 教練後台</div>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    <span>系統運行中</span>
  </div>
</div>

<div class="container">

  <!-- Search -->
  <div class="search-section">
    <div class="search-label">🔐 教練認證 + 學員查詢</div>
    <div class="search-row" style="margin-bottom:10px">
      <input class="search-input" id="coachKeyInput" type="password"
        placeholder="輸入教練密鑰（Coach Key）">
    </div>
    <div class="search-row">
      <input class="search-input" id="userIdInput" type="text"
        placeholder="輸入學員 User ID（例如：usr_155de0661c1640ba）"
        value="usr_155de0661c1640ba">
      <button class="btn-search" onclick="loadUser()">載入數據</button>
    </div>
  </div>

  <!-- Error -->
  <div id="error"></div>

  <!-- Loading -->
  <div id="loading">
    <div class="loader"></div>
    正在載入學員數據...
  </div>

  <!-- Dashboard -->
  <div id="dashboard">

    <!-- User Header -->
    <div class="user-header">
      <div class="user-left">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-info">
          <div class="user-name" id="userName">—</div>
          <div class="user-id" id="userId">—</div>
          <div class="user-since" id="userSince">—</div>
        </div>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-num" id="statTests">0</div>
        <div class="summary-label">FIS 測試次數</div>
      </div>
      <div class="summary-card">
        <div class="summary-num" id="statLogs">0</div>
        <div class="summary-label">訓練日誌次數</div>
      </div>
      <div class="summary-card">
        <div class="summary-num" id="statActivation">—</div>
        <div class="summary-label">平均發力感</div>
        <div class="summary-sub" id="statActivationSub"></div>
      </div>
      <div class="summary-card">
        <div class="summary-num" id="statCompensation">—</div>
        <div class="summary-label">腰部代償率</div>
      </div>
      <div class="summary-card">
        <div class="summary-num" id="statPain">0</div>
        <div class="summary-label">痛點診斷次數</div>
      </div>
    </div>

    <!-- FIS + Progress -->
    <div class="sections-grid">

      <!-- FIS 筋膜線 -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-badge">FIS</div>
          <div class="section-title">最新筋膜線評估</div>
        </div>
        <div class="section-body" id="fasciaSection">
          <div class="empty">尚無測試紀錄</div>
        </div>
      </div>

      <!-- 痛點熱區 -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-badge">RX</div>
          <div class="section-title">痛點熱區統計</div>
        </div>
        <div class="section-body" id="hotspotSection">
          <div class="empty">尚無痛點紀錄</div>
        </div>
      </div>
    </div>

    <!-- 訓練趨勢 -->
    <div class="full-section">
      <div class="section-header">
        <div class="section-badge">DATA</div>
        <div class="section-title">訓練日誌趨勢（最近20次）</div>
      </div>
      <div class="section-body" id="progressSection">
        <div class="empty">尚無訓練紀錄</div>
      </div>
    </div>

    <!-- 痛點診斷歷史 -->
    <div class="full-section">
      <div class="section-header">
        <div class="section-badge">RX</div>
        <div class="section-title">痛點診斷完整歷史</div>
      </div>
      <div id="painSection">
        <div class="empty" style="padding:24px">尚無痛點診斷</div>
      </div>
    </div>

  </div><!-- /dashboard -->
</div>

<script>
const API = 'https://fis-app.alexeywong22.workers.dev';

const fasciaNames = {
  deep_front_line: '深前線 (Deep Front Line)',
  lateral_line: '側線 (Lateral Line)',
  spiral_line: '螺旋線 (Spiral Line)',
  superficial_back_line: '淺背線 (Superficial Back Line)',
  superficial_front_line: '淺前線 (Superficial Front Line)'
};

async function loadUser() {
  const userId = document.getElementById('userIdInput').value.trim();
  if (!userId) { showError('請輸入學員 User ID'); return; }

  document.getElementById('error').style.display = 'none';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    const coachKey = document.getElementById('coachKeyInput').value.trim();
    if (!coachKey) { showError('請輸入教練密鑰'); document.getElementById('loading').style.display='none'; return; }

    const res = await fetch(API + '/api/coach/user-summary', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, coach_key: coachKey })
    });
    const data = await res.json();
    if (res.status === 403) { showError('❌ 教練密鑰錯誤，拒絕存取'); document.getElementById('loading').style.display='none'; return; }
    document.getElementById('loading').style.display = 'none';

    if (data.error) { showError('錯誤：' + data.error); return; }
    renderDashboard(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    showError('網絡錯誤：' + e.message);
  }
}

function showError(msg) {
  var el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function renderDashboard(data) {
  const { user, summary, fisData, progressData, painData } = data;

  // User header
  var initials = (user.name || 'U').substring(0, 1).toUpperCase();
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('userName').textContent = user.name || user.id;
  document.getElementById('userId').textContent = user.id;
  document.getElementById('userSince').textContent = '加入日期：' + (user.created_at || '').substring(0, 10);

  // Summary
  document.getElementById('statTests').textContent = summary.totalFasciaTests || 0;
  document.getElementById('statLogs').textContent = summary.totalProgressLogs || 0;
  document.getElementById('statPain').textContent = summary.totalPainDiagnoses || 0;

  var avg = summary.avgMuscleActivation;
  document.getElementById('statActivation').textContent = avg ? avg + '/4' : '—';
  document.getElementById('statActivationSub').textContent = avg >= 3 ? '狀態良好' : avg >= 2 ? '需要改善' : '需要關注';

  var comp = summary.backCompensationRate;
  document.getElementById('statCompensation').textContent = comp || '—';

  // Fascia lines
  var fasciaEl = document.getElementById('fasciaSection');
  var latest = fisData.latest;
  if (latest) {
    var html = '';
    Object.keys(fasciaNames).forEach(function(key) {
      var val = latest[key];
      var isAlert = val === 1;
      var label = isAlert ? '優先關注' : val === 2 ? '狀態良好' : '未測試';
      var cls = isAlert ? 'badge-alert' : val === 2 ? 'badge-good' : '';
      html += '<div class="fascia-row">' +
        '<span class="fascia-name">' + fasciaNames[key] + '</span>' +
        '<span class="fascia-badge ' + cls + '">' + label + '</span>' +
        '</div>';
    });
    fasciaEl.innerHTML = html;
  }

  // Hotspots
  var hotspotEl = document.getElementById('hotspotSection');
  if (painData.hotspots && painData.hotspots.length > 0) {
    var html = '';
    painData.hotspots.forEach(function(h, i) {
      html += '<div class="hotspot-item">' +
        '<div class="hotspot-rank">' + (i+1) + '</div>' +
        '<div class="hotspot-name">' + h.part + '</div>' +
        '<div class="hotspot-count">' + h.count + '次</div>' +
        '</div>';
    });
    hotspotEl.innerHTML = html;
  }

  // Progress logs
  var progressEl = document.getElementById('progressSection');
  var logs = progressData.logs || [];
  if (logs.length > 0) {
    var html = '';
    logs.forEach(function(log) {
      var act = log.muscle_activation || 0;
      var pct = (act / 4) * 100;
      var barColor = act >= 3 ? '#2ed573' : act >= 2 ? '#ffc845' : '#ff4757';
      var compTag = log.back_compensation === '有'
        ? '<span class="log-tag tag-bad">代償有</span>'
        : log.back_compensation === '輕微'
        ? '<span class="log-tag tag-mid">代償輕微</span>'
        : '<span class="log-tag tag-ok">代償無</span>';
      var tensionColor = log.tension_speed === '1-2次' ? 'tag-ok' : log.tension_speed === '3次後' ? 'tag-mid' : 'tag-bad';
      var tensionTag = '<span class="log-tag ' + tensionColor + '">' + (log.tension_speed || '—') + '</span>';
      html += '<div class="log-item">' +
        '<div class="log-date">' + (log.logged_at || '').substring(0, 10) + '</div>' +
        '<div class="log-activation" style="color:' + barColor + '">' + act + '</div>' +
        '<div class="log-bar-wrap"><div class="log-bar" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
        '<div class="log-tags">' + compTag + tensionTag + '</div>' +
        '</div>';
    });
    progressEl.innerHTML = html;
  }

  // Pain history
  var painEl = document.getElementById('painSection');
  var diagnoses = painData.diagnoses || [];
  if (diagnoses.length > 0) {
    var html = '';
    diagnoses.forEach(function(p) {
      var statusCls = p.status === 'resolved' ? 'status-resolved' : 'status-active';
      var statusLabel = p.status === 'resolved' ? '已解決' : '追蹤中';
      html += '<div class="pain-item">' +
        '<div class="pain-date">' + (p.reported_at || '').substring(0, 10) + '</div>' +
        '<div class="pain-part">' + (p.body_part || '—') + '</div>' +
        '<div class="pain-desc">' + (p.symptom_description || '') + (p.ai_diagnosis ? '<br><span style="color:rgba(0,212,255,0.7)">AI: ' + p.ai_diagnosis.substring(0, 80) + '...</span>' : '') + '</div>' +
        '<span class="pain-status ' + statusCls + '">' + statusLabel + '</span>' +
        '</div>';
    });
    painEl.innerHTML = html;
  }

  document.getElementById('dashboard').style.display = 'block';
}

// 頁面載入後自動查詢（如果有預設值）
window.addEventListener('DOMContentLoaded', function() {
  var defaultId = document.getElementById('userIdInput').value.trim();
  if (defaultId) loadUser();
});
</script>
